[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[[services]]
name = "api"
source = "."

[services.deploy]
startCommand = "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10

[[services]]
name = "worker"
source = "."

[services.deploy]
startCommand = "celery -A src.worker.celery_app worker --beat --loglevel=info"
